{% extends "base.htm" %}

{% block content %}
<main class="container">
  <article class="grid">
    <div class="text-center">
      <h2>Register</h2>
      <form method="POST">
        <label for="username">
          Username
          <input type="text" id="username" name="username" required>
        </label>
        <button type="submit" class="primary">Register</button>
      </form>
      <p><a href="{{ url_for('main.login') }}">Login</a></p>
    </div>
  </article>
</main>
{% endblock %}
